name: Run tests

on:
  push:
  pull_request:
    branches-ignore: [master]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/master') && github.run_id || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: '${{ matrix.os }}'
    continue-on-error: ${{ matrix.python-version == '3.15-dev' }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14', '3.14t', '3.15-dev']
        os: [ubuntu-latest, macOS-latest, windows-latest]
    env:
      PYO3_USE_ABI3_FORWARD_COMPATIBILITY: ${{ matrix.python-version == '3.15-dev' && '1' || '' }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - name: 'Set up Python ${{ matrix.python-version }}'
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '${{ matrix.python-version }}'
          cache: 'pip'
          allow-prereleases: true
          check-latest: true
      - name: Install dependencies
        run: |
          python scripts/ci/install
      - name: Run tests
        run: |
          python scripts/ci/run-tests --with-cov --with-xdist
      - name: Run codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f
        with:
          directory: tests


  urllib3:
    name: 'urllib3 1.x'
    runs-on: 'ubuntu-latest'
    strategy:
      fail-fast: true

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - name: 'Set up Python 3.10'
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python scripts/ci/install
          python  -m pip install "urllib3<2"
      - name: Run tests
        run: |
          python scripts/ci/run-tests --with-cov --with-xdist
